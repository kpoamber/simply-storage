upstream innovare_backend {
    least_conn;
    server app:8080;
    # Additional instances are added via docker-compose --scale app=N
    # Nginx resolves the "app" hostname to all container IPs
}

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS if TLS is configured
    # Uncomment the following lines when TLS certs are available:
    # return 301 https://$host$request_uri;

    # Large file upload support
    client_max_body_size 10G;

    # Long upload/download timeout
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 30s;

    # Health check endpoint (no proxy buffering)
    location /health {
        proxy_pass http://innovare_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://innovare_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for file streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Shared link public endpoints (file downloads)
    location /s/ {
        proxy_pass http://innovare_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for file downloads
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend and SPA fallback
    location / {
        proxy_pass http://innovare_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

