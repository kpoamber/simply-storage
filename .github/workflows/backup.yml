name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Deployment profile'
        required: true
        default: 'small'
        type: choice
        options:
          - small
          - medium
          - large
      server_target:
        description: 'Server to backup'
        required: true
        default: 'hetzner'
        type: choice
        options:
          - hetzner
          - windows

env:
  DEPLOY_DIR_HETZNER: /opt/innovare-storage
  DEPLOY_DIR_WINDOWS: C:/innovare-storage

jobs:
  backup-hetzner:
    name: Backup (Hetzner)
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' && vars.BACKUP_HETZNER != 'false') || inputs.server_target == 'hetzner'
    environment: production

    steps:
      - name: Run backup on Hetzner server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'deploy' }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            # Source server .env to get actual credentials and DEPLOY_PROFILE for scheduled runs
            if [ -f ${{ env.DEPLOY_DIR_HETZNER }}/.env ]; then
              set -a; source ${{ env.DEPLOY_DIR_HETZNER }}/.env; set +a
            fi
            export PROFILE="${{ inputs.profile || '' }}"
            export PROFILE="${PROFILE:-${DEPLOY_PROFILE:-small}}"
            export BACKUP_DIR="/backups"
            export POSTGRES_USER="${POSTGRES_USER:-${{ secrets.POSTGRES_USER || 'innovare' }}}"
            export POSTGRES_DB="${POSTGRES_DB:-${{ secrets.POSTGRES_DB || 'innovare_storage' }}}"
            export COMPOSE_PROJECT="innovare-storage"
            export BACKUP_RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-${{ secrets.BACKUP_RETENTION_DAYS || '30' }}}"
            export WEBHOOK_URL="${WEBHOOK_URL:-${{ secrets.BACKUP_WEBHOOK_URL }}}"

            cd ${{ env.DEPLOY_DIR_HETZNER }}
            chmod +x scripts/backup-cron.sh scripts/backup.sh
            ./scripts/backup-cron.sh

      - name: Verify backup created
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.DEPLOY_USER || 'deploy' }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            echo "Latest backups:"
            ls -lht /backups/backup_*.tar.gz 2>/dev/null | head -5

  backup-windows:
    name: Backup (Windows)
    runs-on: ubuntu-latest
    if: (github.event_name == 'schedule' && vars.BACKUP_WINDOWS == 'true') || inputs.server_target == 'windows'
    environment: production

    steps:
      - name: Run backup on Windows server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.WINDOWS_HOST }}
          username: ${{ secrets.WINDOWS_USER }}
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          script_stop: true
          script: |
            # Source server .env to get actual credentials and DEPLOY_PROFILE for scheduled runs
            if [ -f ${{ env.DEPLOY_DIR_WINDOWS }}/.env ]; then
              set -a; source ${{ env.DEPLOY_DIR_WINDOWS }}/.env; set +a
            fi
            export PROFILE="${{ inputs.profile || '' }}"
            export PROFILE="${PROFILE:-${DEPLOY_PROFILE:-small}}"
            export BACKUP_DIR="/c/backups/innovare"
            export POSTGRES_USER="${POSTGRES_USER:-${{ secrets.POSTGRES_USER || 'innovare' }}}"
            export POSTGRES_DB="${POSTGRES_DB:-${{ secrets.POSTGRES_DB || 'innovare_storage' }}}"
            export COMPOSE_PROJECT="innovare-storage"
            export BACKUP_RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-${{ secrets.BACKUP_RETENTION_DAYS || '30' }}}"
            export WEBHOOK_URL="${WEBHOOK_URL:-${{ secrets.BACKUP_WEBHOOK_URL }}}"

            cd ${{ env.DEPLOY_DIR_WINDOWS }}
            chmod +x scripts/backup-cron.sh scripts/backup.sh
            ./scripts/backup-cron.sh

      - name: Verify backup created
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.WINDOWS_HOST }}
          username: ${{ secrets.WINDOWS_USER }}
          key: ${{ secrets.WINDOWS_SSH_KEY }}
          script: |
            echo "Latest backups:"
            ls -lht /c/backups/innovare/backup_*.tar.gz 2>/dev/null | head -5
