name: Test Weekly Report
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Run weekly report
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            if [ -f /opt/innovare-storage/.env ]; then
              set -a; source /opt/innovare-storage/.env; set +a
            fi
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            export TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
            export COMPOSE_PROJECT="innovare-storage"
            export POSTGRES_USER="${POSTGRES_USER:-innovare}"
            export POSTGRES_DB="${POSTGRES_DB:-innovare_storage}"
            /opt/innovare-storage/scripts/weekly-report.sh
