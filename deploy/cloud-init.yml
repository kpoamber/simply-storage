#cloud-config
# Cloud-init template for bootstrapping Innovare Storage on Hetzner/DigitalOcean droplets
#
# Usage:
#   - Hetzner: pass as user-data when creating a server via API or Cloud Console
#   - DigitalOcean: pass as user-data when creating a droplet
#
# Required variables (replace before use or inject via cloud provider metadata):
#   GHCR_TOKEN    - GitHub Container Registry personal access token (read:packages)
#   GHCR_USER     - GitHub username for GHCR authentication
#   IMAGE_REPO    - Full image path, e.g. ghcr.io/yourorg/innovare-storage:latest
#   JOIN_NODE_IP  - (optional) IP of existing node to sync config from

package_update: true

packages:
  - docker.io
  - docker-compose-plugin
  - curl
  - jq

runcmd:
  # Enable and start Docker
  - systemctl enable docker
  - systemctl start docker

  # Authenticate to GHCR (token injected via user-data or metadata)
  - echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

  # Pull the latest image
  - docker pull "${IMAGE_REPO:-ghcr.io/yourorg/innovare-storage:latest}"

  # Create data directories
  - mkdir -p /opt/innovare-storage/data/temp
  - mkdir -p /opt/innovare-storage/config

  # If JOIN_NODE_IP is set, fetch config from existing node
  - |
    if [ -n "${JOIN_NODE_IP}" ]; then
      echo "Joining cluster via ${JOIN_NODE_IP}..."
      curl -sf "http://${JOIN_NODE_IP}:8080/api/system/config-export" > /opt/innovare-storage/config/cluster-config.json
      echo "Config synced from existing node"
    fi

  # Create systemd service for Innovare Storage
  - |
    cat > /etc/systemd/system/innovare-storage.service <<'UNIT'
    [Unit]
    Description=Innovare Storage Service
    After=docker.service
    Requires=docker.service

    [Service]
    Type=simple
    Restart=always
    RestartSec=10
    ExecStartPre=-/usr/bin/docker rm -f innovare-storage
    ExecStart=/usr/bin/docker run --name innovare-storage \
      --network host \
      -v /opt/innovare-storage/data:/app/data \
      -v /opt/innovare-storage/config:/app/config \
      -e RUST_LOG=info \
      ${IMAGE_REPO:-ghcr.io/yourorg/innovare-storage:latest}
    ExecStop=/usr/bin/docker stop innovare-storage

    [Install]
    WantedBy=multi-user.target
    UNIT

  - systemctl daemon-reload
  - systemctl enable innovare-storage
  - systemctl start innovare-storage
