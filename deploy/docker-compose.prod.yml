services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - innovare

  app:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAME:-innovare/innovare-storage}:${IMAGE_TAG:-latest}
    environment:
      - APP_SERVER__HOST=0.0.0.0
      - APP_SERVER__PORT=8080
      - APP_DATABASE__URL=postgres://${POSTGRES_USER:-innovare}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-innovare_storage}?sslmode=disable
      - APP_DATABASE__MAX_CONNECTIONS=${DB_MAX_CONNECTIONS:-10}
      - APP_STORAGE__LOCAL_TEMP_PATH=/app/data/temp
      - APP_STORAGE__HMAC_SECRET=${HMAC_SECRET:?HMAC_SECRET must be set}
      - APP_SYNC__NUM_WORKERS=${SYNC_NUM_WORKERS:-4}
      - APP_SYNC__MAX_RETRIES=${SYNC_MAX_RETRIES:-5}
      - APP_SYNC__POLL_INTERVAL_SECS=${SYNC_POLL_INTERVAL:-5}
      - APP_SYNC__TIER_SCAN_INTERVAL_SECS=${TIER_SCAN_INTERVAL:-300}
      - APP_AUTH__JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - APP_AUTH__DEFAULT_ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - APP_AUTH__DEFAULT_ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - RUST_LOG=${RUST_LOG:-info}
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - innovare

  postgres:
    image: citusdata/citus:12.1
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-innovare}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-innovare_storage}
    volumes:
      - postgres_coordinator_data:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-innovare} -d ${POSTGRES_DB:-innovare_storage}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - innovare

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done'"
    restart: unless-stopped

volumes:
  app_data:
  postgres_coordinator_data:
  certbot_webroot:
  certbot_certs:
  backups:

networks:
  innovare:
    driver: bridge
