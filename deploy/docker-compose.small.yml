# Small profile: 1 app replica, standalone PostgreSQL (no Citus workers)
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.small.yml up -d

services:
  app:
    deploy:
      replicas: 1
      resources:
        # Raised from 512M because syncing multi-hundred-MB files (even with
        # streaming download + upload) needs ~600–800 MB headroom for reqwest
        # buffers, SDK clients, the tokio runtime and the DB pool. 512M caused
        # cgroup OOM-kills mid-transfer on a real ~316 MB file in prod.
        limits:
          memory: 1024M
        reservations:
          memory: 384M
    environment:
      - APP_DATABASE__MAX_CONNECTIONS=5
      # Sequentialise sync work so we never pile up multiple multi-hundred-MB
      # transfers in the same container. Throughput stays fine; peak memory
      # stays bounded.
      - APP_SYNC__NUM_WORKERS=1

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
      -c archive_timeout=900
      -c max_wal_size=256MB
      -c min_wal_size=64MB

  nginx:
    deploy:
      resources:
        limits:
          memory: 128M
