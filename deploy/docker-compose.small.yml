# Small profile: 1 app replica, standalone PostgreSQL (no Citus workers)
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.small.yml up -d

services:
  app:
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - APP_DATABASE__MAX_CONNECTIONS=5
      - APP_SYNC__NUM_WORKERS=2

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
      -c archive_timeout=900
      -c max_wal_size=256MB
      -c min_wal_size=64MB

  nginx:
    deploy:
      resources:
        limits:
          memory: 128M
